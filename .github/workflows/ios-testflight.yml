name: TestFlight Deploy

# Archives, signs (Xcode cloud signing), and uploads the app to TestFlight.
#
# Requires an Apple Developer Program membership ($99/yr) and three repo
# secrets (Settings → Secrets and variables → Actions → New repository secret):
#
#   APPLE_TEAM_ID        10-char Team ID (developer.apple.com/account → Membership)
#   APPSTORE_KEY_ID      App Store Connect API key ID
#   APPSTORE_ISSUER_ID   App Store Connect API issuer ID
#   APPSTORE_P8_BASE64   The .p8 private key file, base64-encoded
#
# Create the API key at appstoreconnect.apple.com → Users and Access →
# Integrations → App Store Connect API → "+" (role: App Manager). Download the
# .p8 once, then: base64 -w0 AuthKey_XXXX.p8  → paste as APPSTORE_P8_BASE64.
#
# One-time in App Store Connect: create the app record (My Apps → "+") with
# bundle ID legal.asklexi.app. Cloud signing (-allowProvisioningUpdates)
# handles certificates/profiles automatically on the runner.

on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets are configured
        env:
          TEAM: ${{ secrets.APPLE_TEAM_ID }}
          KEY: ${{ secrets.APPSTORE_KEY_ID }}
          ISSUER: ${{ secrets.APPSTORE_ISSUER_ID }}
          P8: ${{ secrets.APPSTORE_P8_BASE64 }}
        run: |
          missing=""
          [ -z "$TEAM" ] && missing="$missing APPLE_TEAM_ID"
          [ -z "$KEY" ] && missing="$missing APPSTORE_KEY_ID"
          [ -z "$ISSUER" ] && missing="$missing APPSTORE_ISSUER_ID"
          [ -z "$P8" ] && missing="$missing APPSTORE_P8_BASE64"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing — see the header of this workflow file."
            exit 1
          fi

      - name: Install XcodeGen & generate project
        run: |
          brew install xcodegen
          python3 tools/gen_assets.py
          xcodegen generate

      - name: Write App Store Connect API key
        env:
          P8: ${{ secrets.APPSTORE_P8_BASE64 }}
          KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$P8" | base64 --decode > ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Archive (cloud signing)
        env:
          KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -scheme AskLexi \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/AskLexi.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic | tee archive.log | tail -40

      - name: Export & upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/AskLexi.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" | tee export.log | tail -40
          echo "Uploaded to App Store Connect — processing takes ~5-15 min, then the build appears in TestFlight."

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestFlightLogs
          path: |
            ios/archive.log
            ios/export.log
          if-no-files-found: ignore
