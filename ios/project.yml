# XcodeGen project spec for the AskLexi iOS app ("Lexi by Lexitio").
#
# Generate the Xcode project on a Mac with:
#   brew install xcodegen        # once
#   cd ios && xcodegen generate  # produces AskLexi.xcodeproj
#   open AskLexi.xcodeproj
#
# See README.md for the full setup / signing / deep-link walkthrough.

name: AskLexi
options:
  bundleIdPrefix: legal.asklexi
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: 1        # iPhone only for v1
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # `targeted` checks Sendable across explicit boundaries without the broad
    # noise of `complete`. The app is written to be data-race-safe either way.
    SWIFT_STRICT_CONCURRENCY: targeted
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    # Set your 10-char Apple Developer Team ID in Configs/Shared.xcconfig
    # (DEVELOPMENT_TEAM) rather than here so it stays out of source control.

configs:
  Debug: debug
  Release: release

targets:
  AskLexi:
    type: application
    platform: iOS
    sources:
      - path: AskLexi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: legal.asklexi.app
        INFOPLIST_FILE: AskLexi/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AskLexi/Resources/AskLexi.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: BrandAccent
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    configFiles:
      Debug: Configs/Dev.xcconfig
      Release: Configs/Prod.xcconfig

  AskLexiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AskLexiTests
    dependencies:
      - target: AskLexi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: legal.asklexi.app.tests
        GENERATE_INFOPLIST_FILE: YES

  AskLexiUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AskLexiUITests
    dependencies:
      - target: AskLexi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: legal.asklexi.app.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AskLexi:
    build:
      targets:
        AskLexi: all
        AskLexiTests: [test]
        AskLexiUITests: [test]
    run:
      config: Debug
      # Point the scheme at the local StoreKit config so paywall UI can be
      # exercised in the simulator once Config.iapEnabled is flipped on.
      storeKitConfiguration: AskLexi/Resources/Legal.storekit
    test:
      config: Debug
      targets:
        - AskLexiTests
        - AskLexiUITests
    profile:
      config: Release
    archive:
      config: Release
